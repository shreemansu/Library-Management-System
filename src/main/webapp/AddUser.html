<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register Here</title>

<style>
    body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #f4f6f9;
        margin: 0;
        padding: 0;
    }

    h1 {
        text-align: center;
        margin-top: 40px;
        color: #333;
    }

    form {
        width: 380px;
        margin: 30px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.12);
    } 

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #555;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
    }

    input:focus {
        border-color: #007bff;
        outline: none;
        box-shadow: 0 0 4px rgba(0, 123, 255, 0.4);
    }

    input[type="submit"] {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        border: none;
        border-radius: 5px;
        color: #ffffff;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    input[type="submit"]:hover {
        background-color: #0056b3;
    }
</style>

</head>
<body>

<h1>Add User Form</h1>

<form action="adduser" method="post">

    <label>Enter User Name</label>
    <input type="text" name="uname" required>

    <label>Enter User Role</label>
    <input type="text" name="role" required>

    <label>Enter User Password</label>
    <input type="password" name="password" required>

    <input type="submit" value="Add User">

</form>

</body>
</html>
